<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artists' Notes — SHIO:RI</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- 왼쪽 메뉴 -->
  <aside class="side left">
    <div class="side-inner">
      <a href="index.html" class="side-title">
        <img src="title.svg" alt="SHIO:RI logo">
      </a>

      <nav class="nav">
        <a href="About.html">About</a>
        <a href="IntroductionText.html">Text</a>
        <a href="Works.html">Works</a>
        <br>
        <a href="Bts.html">Bts</a>
        <a href="ArtistsNotes.html">Artists' Notes</a>
      </nav>
    </div>
  </aside>

  <!-- 가운데 컨텐츠 -->
  <main class="center">
    <section class="block note-page">
      <div class="text">
        <h2>Artists' Notes</h2>
        <img src="note1.jpeg" alt="Artist note image" class="note-image">
        <p>전시를 준비하는 과정에서 작성된 작가노트 일부</p>
      </div>

      <div class="notes-feed" id="notesFeed"></div>
    </section>
  </main>

  <script>
    const feed = document.getElementById("notesFeed");

    const imageList = [
      "n0.jpeg", "n1.jpeg", "n5.jpeg", "n19.jpeg", "n43.jpeg",
      "n6.jpeg", "n7.jpeg", "n8.jpeg", "n9.jpeg", "n10.jpeg", "n11.jpeg",
      "n12.jpeg", "n13.jpeg",
      "n15.jpeg", "n16.jpeg", "n17.jpeg", "n18.jpeg", "n4.jpeg", "n20.jpeg",
      "n21.jpeg", "n22.jpeg", "n23.jpeg", "n24.jpeg", "n25.jpeg", "n26.jpeg",
      "n27.jpeg", "n28.jpeg", "n29.jpeg", "n30.jpeg", "n31.jpeg", "n32.jpeg",
      "n33.jpeg", "n34.jpeg", "n35.jpeg", "n36.jpeg", "n37.jpeg", "n38.jpeg",
      "n39.jpeg", "n40.jpeg", "n41.jpeg", "n42.jpeg", "n3.jpeg", "n44.jpeg",
      "n45.jpeg", "n46.jpeg"
    ];

    const positionClasses = ["left", "mid-left", "center", "mid-right", "right"];
    const widthClasses = ["size-s", "size-m", "size-l"];

    imageList.forEach((file, index) => {
      const figure = document.createElement("figure");
      figure.className = "note-item reveal";

      figure.classList.add(positionClasses[index % positionClasses.length]);
      figure.classList.add(widthClasses[index % widthClasses.length]);

      const img = document.createElement("img");
      img.src = "3-2/" + file;
      img.alt = file;
      img.className = "note-img";
      img.loading = "lazy";

      figure.appendChild(img);
      feed.appendChild(figure);
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
        }
      });
    }, {
      threshold: 0.12
    });

    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
  </script>
</body>
</html>
